version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # --- SECCIÓN DE VOLÚMENES AÑADIDA ---
    volumes:
      - cmmolina_img:/var/www/public/img
      - cmmolina_writable:/var/www/writable
    # ------------------------------------
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COOLIFY_RESOURCE_UUID}.rule=Host(`${COOLIFY_FQDN}`)"
      - "traefik.http.routers.${COOLIFY_RESOURCE_UUID}.entrypoints=https"
      - "traefik.http.routers.${COOLIFY_RESOURCE_UUID}.tls=true"
      - "traefik.http.routers.${COOLIFY_RESOURCE_UUID}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COOLIFY_RESOURCE_UUID}.loadbalancer.server.port=80"

# --- DEFINICIÓN DE VOLÚMENES ---
volumes:
  cmmolina_img:
    name: cmmolina_img
  cmmolina_writable:
    name: cmmolina_writable

networks:
  coolify:
    external: true