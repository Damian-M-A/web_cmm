version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www
    environment:
      PHP_MEMORY_LIMIT: 256M
    networks:
      - coolify

  web:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    depends_on:
      - app
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COOLIFY_RESOURCE_UUID}.rule=Host(`${COOLIFY_FQDN}`)"
      - "traefik.http.routers.${COOLIFY_RESOURCE_UUID}.entrypoints=https"
      - "traefik.http.routers.${COOLIFY_RESOURCE_UUID}.tls=true"
      - "traefik.http.routers.${COOLIFY_RESOURCE_UUID}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COOLIFY_RESOURCE_UUID}.loadbalancer.server.port=80"

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - coolify

volumes:
  pgdata:

networks:
  coolify:
    external: true